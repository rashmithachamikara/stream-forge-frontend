                                  "$ref": "#/components/schemas/CompleteUploadSessionResponseDto",
                                },
                            },
                        },
                    },
                },
            },
        },
      "/api/v1/videos/{videoId}/playback/manifest":
        {
          "get":
            {
              "tags": ["VideoPlayback"],
              "parameters":
                [
                  {
                    "name": "videoId",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "string", "format": "uuid" },
                  },
                  {
                    "name": "shareToken",
                    "in": "query",
                    "schema": { "type": "string" },
                  },
                ],
              "responses": { "200": { "description": "OK" } },
            },
        },
