                                  "$ref": "#/components/schemas/UploadTargetDto",
                                },
                            },
                        },
                    },
                },
            },
        },
      "/api/v1/uploads/sessions/{sessionId}/parts/{partNumber}":
        {
          "post":
            {
              "tags": ["UploadSessions"],
              "parameters":
                [
                  {
                    "name": "sessionId",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "string", "format": "uuid" },
                  },
                  {
                    "name": "partNumber",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "integer", "format": "int32" },
                  },
                ],
              "requestBody":
                {
                  "content":
                    {
                      "multipart/form-data":
                        {
                          "schema":
                            {
                              "required": ["checksum", "file"],
                              "type": "object",
                              "properties":
                                {
                                  "file":
                                    { "type": "string", "format": "binary" },
                                  "checksum": { "type": "string" },
                                },
                            },
                          "encoding":
                            {
                              "file": { "style": "form" },
                              "checksum": { "style": "form" },
                            },
                        },
                    },
                },
              "responses":
                {
                  "200":
                    {
                      "description": "OK",
                      "content":
                        {
                          "text/plain":
                            {
                              "schema":
                                {
                                  "$ref": "#/components/schemas/UploadPartResponseDto",
                                },
                            },
                          "application/json":
                            {
                              "schema":
                                {
                                  "$ref": "#/components/schemas/UploadPartResponseDto",
                                },
                            },
                          "text/json":
                            {
                              "schema":
                                {
                                  "$ref": "#/components/schemas/UploadPartResponseDto",
                                },
                            },
                        },
                    },
                },
            },
        },
