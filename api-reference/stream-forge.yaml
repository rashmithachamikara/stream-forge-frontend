        {
          "get":
            {
              "tags": ["VideoPlayback"],
              "parameters":
                [
                  {
                    "name": "videoId",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "string", "format": "uuid" },
                  },
                  {
                    "name": "assetPath",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "string" },
                  },
                  {
                    "name": "shareToken",
                    "in": "query",
                    "schema": { "type": "string" },
                  },
                ],
              "responses": { "200": { "description": "OK" } },
            },
        },
      "/api/v1/videos/{videoId}/thumbnail":
        {
          "get":
            {
              "tags": ["VideoPlayback"],
              "parameters":
                [
                  {
                    "name": "videoId",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "string", "format": "uuid" },
                  },
                  {
                    "name": "shareToken",
                    "in": "query",
                    "schema": { "type": "string" },
                  },
                ],
              "responses": { "200": { "description": "OK" } },
            },
        },
    },
  "components":
    {
      "schemas":
        {
          "AuthResponseDto":
            {
              "type": "object",
              "properties":
                {
                  "user": { "$ref": "#/components/schemas/AuthUserDto" },
                  "accessToken": { "type": "string", "nullable": true },
                  "refreshToken": { "type": "string", "nullable": true },
                  "accessTokenExpiresAt":
                    { "type": "string", "format": "date-time" },
                  "refreshTokenExpiresAt":
                    { "type": "string", "format": "date-time" },
                },
              "additionalProperties": false,
            },
          "AuthUserDto":
            {
              "type": "object",
              "properties":
                {
                  "id": { "type": "string", "format": "uuid" },
                  "name": { "type": "string", "nullable": true },
                  "email": { "type": "string", "nullable": true },
                  "role": { "$ref": "#/components/schemas/UserRole" },
                },
              "additionalProperties": false,
            },
          "CompleteUploadSessionRequestDto":
            {
              "type": "object",
              "properties":
                {
                  "sessionId": { "type": "string", "format": "uuid" },
                  "fileName": { "type": "string", "nullable": true },
                },
              "additionalProperties": false,
            },
          "CompleteUploadSessionResponseDto":
            {
              "type": "object",
              "properties":
                {
                  "sessionId": { "type": "string", "format": "uuid" },
                  "videoId":
                    { "type": "string", "format": "uuid", "nullable": true },
                  "status": { "type": "string", "nullable": true },
                },
              "additionalProperties": false,
            },
          "CreateUploadSessionRequestDto":
            {
              "type": "object",
              "properties":
                {
                  "title": { "type": "string", "nullable": true },
                  "description": { "type": "string", "nullable": true },
                  "totalSize": { "type": "integer", "format": "int64" },
                  "contentType": { "type": "string", "nullable": true },
                  "categoryId":
                    { "type": "string", "format": "uuid", "nullable": true },
                  "visibility":
                    { "$ref": "#/components/schemas/VideoVisibility" },
                  "tagIds":
                    {
                      "type": "array",
                      "items": { "type": "string", "format": "uuid" },
                      "nullable": true,
                    },
                },
              "additionalProperties": false,
            },
          "CreateUploadSessionResponseDto":
            {
              "type": "object",
              "properties":
                {
                  "sessionId": { "type": "string", "format": "uuid" },
                  "videoId": { "type": "string", "format": "uuid" },
                  "expiresAt": { "type": "string", "format": "date-time" },
                  "videoTitle": { "type": "string", "nullable": true },
                },
              "additionalProperties": false,
            },
          "LoginRequestDto":
            {
              "type": "object",
              "properties":
                {
                  "email": { "type": "string", "nullable": true },
                  "password": { "type": "string", "nullable": true },
                },
              "additionalProperties": false,
            },
          "RefreshTokenRequestDto":
            {
              "type": "object",
              "properties":
                { "refreshToken": { "type": "string", "nullable": true } },
              "additionalProperties": false,
            },
          "RegisterRequestDto":
            {
              "type": "object",
              "properties":
                {
                  "name": { "type": "string", "nullable": true },
                  "email": { "type": "string", "nullable": true },
                  "password": { "type": "string", "nullable": true },
                },
              "additionalProperties": false,
            },
          "UploadPartResponseDto":
            {
              "type": "object",
              "properties":
                {
                  "sessionId": { "type": "string", "format": "uuid" },
                  "partNumber": { "type": "integer", "format": "int32" },
                  "isComplete": { "type": "boolean" },
                },
              "additionalProperties": false,
            },
          "UploadTargetDto":
            {
              "type": "object",
              "properties":
                {
                  "type": { "type": "string", "nullable": true },
                  "url": { "type": "string", "nullable": true },
                  "headers":
                    {
                      "type": "object",
                      "additionalProperties": { "type": "string" },
                      "nullable": true,
                    },
                  "httpMethod": { "type": "string", "nullable": true },
                },
              "additionalProperties": false,
            },
          "UserRole":
            { "enum": ["Admin", "Editor", "Viewer"], "type": "string" },
          "VideoVisibility":
            { "enum": ["Public", "Private", "Internal"], "type": "string" },
          "WeatherForecast":
            {
              "type": "object",
              "properties":
                {
                  "date": { "type": "string", "format": "date" },
                  "temperatureC": { "type": "integer", "format": "int32" },
                  "summary": { "type": "string", "nullable": true },
                  "temperatureF":
                    { "type": "integer", "format": "int32", "readOnly": true },
                },
              "additionalProperties": false,
            },
        },
      "securitySchemes":
        {
          "Bearer":
            {
              "type": "http",
              "description": "Enter JWT token as: Bearer {token}",
              "scheme": "bearer",
              "bearerFormat": "JWT",
            },
        },
    },
  "security": [{ "Bearer": [] }],
}
