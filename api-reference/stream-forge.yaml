      "/api/v1/uploads/sessions/{sessionId}/target":
        {
          "get":
            {
              "tags": ["UploadSessions"],
              "parameters":
                [
                  {
                    "name": "sessionId",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "string", "format": "uuid" },
                  },
                  {
                    "name": "partNumber",
                    "in": "query",
                    "schema": { "type": "integer", "format": "int32" },
                  },
                  {
                    "name": "partSize",
                    "in": "query",
                    "schema": { "type": "integer", "format": "int64" },
                  },
                ],
              "responses":
                {
                  "200":
                    {
                      "description": "OK",
                      "content":
                        {
                          "text/plain":
                            {
                              "schema":
                                {
                                  "$ref": "#/components/schemas/UploadTargetDto",
                                },
                            },
                          "application/json":
                            {
                              "schema":
